name: angelic-pastries

services:
    website:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${WEBSITE_IMAGE:-ghcr.io/dragoninventor/angelic-pastries/website:latest}
        restart: unless-stopped
        environment:
            # Website
            - DATABASE_URL=${DATABASE_URL}
            - PAYLOAD_SECRET=${PAYLOAD_SECRET}
            - NEXT_PUBLIC_BUSINESS_NAME=${NEXT_PUBLIC_BUSINESS_NAME}
            - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}

            # Stripe
            - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
            - STRIPE_WEBHOOKS_SIGNING_SECRET=${STRIPE_WEBHOOKS_SIGNING_SECRET}
            - STRIPE_API_VERSION=${STRIPE_API_VERSION}

            # Email
            - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
            - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
            - SMTP_HOST=${SMTP_HOST}
            - SMTP_PORT=${SMTP_PORT}
            - SMTP_USER=${SMTP_USER}
            - SMTP_TOKEN=${SMTP_TOKEN}

            # HCaptcha
            - NEXT_PUBLIC_HCAPTCHA_SITE_KEY=${NEXT_PUBLIC_HCAPTCHA_SITE_KEY}
            - HCAPTCHA_SECRET_KEY=${HCAPTCHA_SECRET_KEY}
        volumes:
            - payload-data:/app/public/media
        working_dir: /app
        depends_on:
            - db

    db:
        restart: always
        image: mongo:latest
        command:
            - --storageEngine=wiredTiger
        volumes:
            - data:/data/db

    caddy:
        restart: unless-stopped
        image: ${CADDY_IMAGE:-ghcr.io/dragoninventor/angelic-pastries/caddy:latest}
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - website
        environment:
            - DOMAIN=angelicpastries.com

volumes:
    data:
        external: true
    payload-data:
        external: true
    caddy_data:
        name: "caddy_data"
    caddy_config:
        name: "caddy_config"
